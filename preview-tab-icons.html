<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Iconos barra inferior - mini-timer</title>
<style>
  :root { color-scheme: dark; }
  body { margin:0; background:#0b0f14; color:#e8eaed; font-family:'Segoe UI',Roboto,system-ui,sans-serif; }
  .wrap { max-width:480px; margin:0 auto; padding:24px 16px 40px; }
  h1 { font-size:18px; font-weight:600; text-align:center; margin:8px 0 4px; }
  p.sub { text-align:center; color:#9aa0a6; font-size:13px; margin:0 0 24px; }
  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
  .card { background:#161b22; border-radius:20px; padding:20px 8px; text-align:center; }
  .card svg { width:48px; height:48px; }
  .squircle { width:64px; height:64px; }
  .lbl { margin-top:10px; font-size:13px; color:#c7ccd1; }
  .navbar { margin-top:28px; background:#161b22; border-radius:28px; padding:8px; display:flex; justify-content:space-around; align-items:center; }
  .navitem { display:flex; flex-direction:column; align-items:center; gap:4px; padding:6px 14px; border-radius:20px; font-size:11px; color:#9aa0a6; }
  .navitem svg { width:24px; height:24px; }
  .selwrap { display:flex; flex-direction:column; align-items:center; gap:4px; }
  .pill { background:#7c4dff; border-radius:20px; padding:4px 18px; display:flex; }
  .pill-lbl { font-size:11px; color:#7c4dff; }
  .note { margin-top:24px; color:#9aa0a6; font-size:12px; text-align:center; line-height:1.5; }
  .origrow { margin-top:30px; display:flex; gap:16px; justify-content:center; align-items:center; }
  .squircle-bg { background:#111; border-radius:30%; width:90px; height:90px; display:flex; align-items:center; justify-content:center; }
  .squircle-bg svg { width:54px; height:54px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Iconos vectorizados (rellenos)</h1>
  <p class="sub">En la app se tinta segun seleccion. El atleta va ligeramente girado (-12&deg;)</p>

  <div class="grid">
    <div class="card">
      <svg viewBox="0 0 24 24" fill="#e8eaed">
        <path d="M6,2v6h0.01L6,8.01 10,12l-4,4 0.01,0.01H6V22h12v-5.99h-0.01L18,16l-4,-4 4,-3.99 -0.01,-0.01H18V2H6z"/>
      </svg>
      <div class="lbl">Temporizador</div>
    </div>
    <div class="card">
      <svg viewBox="0 0 24 24" fill="#e8eaed">
        <path fill-rule="evenodd" transform="rotate(-12 12 12)"
          d="M12,3 L19.04,6.39 L20.77,14 L15.91,20.11 L8.09,20.11 L3.23,14 L4.96,6.39 Z M7.0,6.6 L7.7,6.6 L7.7,17.6 L7.0,17.6 Z"/>
      </svg>
      <div class="lbl">Atleta</div>
    </div>
    <div class="card">
      <svg viewBox="0 0 24 24" fill="#e8eaed">
        <path d="M12,3 C12,3 5.5,10.5 5.5,15 A6.5,6.5 0 1,0 18.5,15 C18.5,10.5 12,3 12,3 Z"/>
      </svg>
      <div class="lbl">Agua</div>
    </div>
  </div>

  <p class="sub" style="margin-top:30px">Comparacion atleta sobre fondo squircle (como el original)</p>
  <div class="origrow">
    <div class="squircle-bg">
      <svg viewBox="0 0 24 24" fill="#ececec">
        <path fill-rule="evenodd" transform="rotate(-12 12 12)"
          d="M12,3 L19.04,6.39 L20.77,14 L15.91,20.11 L8.09,20.11 L3.23,14 L4.96,6.39 Z M7.0,6.6 L7.7,6.6 L7.7,17.6 L7.0,17.6 Z"/>
      </svg>
    </div>
  </div>

  <div class="navbar">
    <div class="navitem">
      <div class="selwrap">
        <div class="pill">
          <svg viewBox="0 0 24 24" fill="#0b0f14">
            <path d="M6,2v6h0.01L6,8.01 10,12l-4,4 0.01,0.01H6V22h12v-5.99h-0.01L18,16l-4,-4 4,-3.99 -0.01,-0.01H18V2H6z"/>
          </svg>
        </div>
        <span class="pill-lbl">Temporizador</span>
      </div>
    </div>
    <div class="navitem">
      <svg viewBox="0 0 24 24" fill="#9aa0a6">
        <path fill-rule="evenodd" transform="rotate(-12 12 12)"
          d="M12,3 L19.04,6.39 L20.77,14 L15.91,20.11 L8.09,20.11 L3.23,14 L4.96,6.39 Z M7.0,6.6 L7.7,6.6 L7.7,17.6 L7.0,17.6 Z"/>
      </svg>
      <span>Atleta</span>
    </div>
    <div class="navitem">
      <svg viewBox="0 0 24 24" fill="#9aa0a6">
        <path d="M12,3 C12,3 5.5,10.5 5.5,15 A6.5,6.5 0 1,0 18.5,15 C18.5,10.5 12,3 12,3 Z"/>
      </svg>
      <span>Agua</span>
    </div>
  </div>

  <p class="note">Temporizador = funcional. Atleta / Agua = "Proximamente".</p>
</div>
</body>
</html>
